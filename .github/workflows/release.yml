name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Only version if pending changesets exist (pre-push hook usually handles this)
      - name: Check for pending changesets
        id: check
        run: |
          PENDING=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | head -1)
          if [ -n "$PENDING" ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.check.outputs.pending == 'true'
        run: pnpm changeset version

      - name: Commit version bumps
        if: steps.check.outputs.pending == 'true'
        run: |
          git config user.name "kgentic-dev"
          git config user.email "support@kgentic.ai"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): version packages"
          git push
        env:
          HUSKY: '0'

      # No npm publish — all packages are private (distributed via git/marketplace)
